services:
  postgres:
    image: postgres:16-alpine
    container_name: compras-paraguai-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-compras_paraguai}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-compras_paraguai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: compras-paraguai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-compras_paraguai}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SERVER_PORT: 8080
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  postgres_data:
