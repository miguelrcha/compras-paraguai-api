name: Daily Product Monitor

# Agendamento automático desativado: comprasparaguai.com.br bloqueia (403)
# requisições vindas de IPs de datacenter/nuvem, incluindo os runners do
# GitHub Actions. Por enquanto o monitoramento diário roda localmente
# (veja o README). Mantido como workflow_dispatch para testes manuais
# ou para reativar caso um proxy residencial seja adicionado.
on:
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start containers
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: docker compose up --build -d

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8080/api/products || true)
            if [ "$code" != "000" ]; then
              echo "App is up (HTTP $code)"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          exit 1

      - name: Trigger monitor (scraping + envio Telegram)
        run: curl -sf --max-time 180 http://localhost:8080/api/products/monitor

      - name: Show app logs
        if: always()
        run: docker compose logs app --tail 150

      - name: Stop containers
        if: always()
        run: docker compose down
